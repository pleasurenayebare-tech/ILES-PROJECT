<!doctype html>
<!-- Declares the document type as HTML5 -->

<html lang="en">
<!-- Root HTML element ; lang="e" sets the page language to English for accessibility and SEO -->
  <head>
<!-- Contains metadata and resource links-not visible on the page -->
    <meta charset="UTF-8" />
<!-- Sets character encoding to UTF-8, supporting most characters and symbols -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<!-- Links the browser tab icon (favicon) as an SVG image -->
    <meta name="viewport"
<!-- Makes the page responsive:matches the screen width and sets default zoom to 100% -->
 content="width=device-width, initial-scale=1.0" />

    <title>web</title>
<!-- Sets the browser tab title -->
  </head>
  <body>
<!-- Visible page content goes here -->
    <div id="root"></div>
<!-- Empty container where React will mount and render the entire app -->
    <script type="module" src="/src/main.jsx"></script>
<!-- Loads the React app entry point as an ES module (Vite/React setup) -->
  </body>
</html>
